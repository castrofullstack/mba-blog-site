name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64, html

          dist = Path('dist')
          (dist / 'assets').mkdir(parents=True, exist_ok=True)
          (dist / 'blog').mkdir(parents=True, exist_ok=True)
          (dist / 'CNAME').write_text('christophercastro.mba\n')
          (dist / 'assets' / 'hero-healthcare.jpg').write_bytes(base64.b64decode(Path('hero-healthcare.jpg.b64').read_text()))

          css = """
          body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#172033;line-height:1.6;background:#fff}a{color:inherit}.site-header,.site-footer,.section,.page-header,.content-band{width:min(1120px,calc(100% - 40px));margin:auto}.site-header{min-height:76px;display:flex;align-items:center;justify-content:space-between;gap:24px}.brand{display:flex;align-items:center;gap:10px;font-weight:800;text-decoration:none}.brand-mark{width:38px;height:38px;display:grid;place-items:center;border-radius:8px;color:#fff;background:#0b3b75;font-size:.82rem}.site-header nav{display:flex;gap:22px;flex-wrap:wrap}.site-header nav a{color:#5c667a;font-weight:700;text-decoration:none}.hero{width:min(1120px,calc(100% - 40px));margin:8px auto 70px}.hero img{width:100%;height:auto;display:block;border-radius:0;border:1px solid #dbe3ef;box-shadow:0 18px 50px rgba(23,32,51,.12)}.section{padding-block:70px}.section-muted{width:100%;max-width:none;padding-inline:max(20px,calc((100% - 1120px)/2));background:#f4f8fc}.eyebrow{margin:0 0 12px;color:#0f8c8c;font-size:.78rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1{max-width:900px;margin:0 0 18px;font-size:clamp(2.3rem,6vw,5rem);line-height:1}h2{font-size:clamp(1.8rem,4vw,3rem);line-height:1.08}p{color:#5c667a}.button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;border:1px solid #1769d2;border-radius:8px;padding:10px 18px;color:white;background:#1769d2;font-weight:800;text-decoration:none}.post-grid,.contact-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}.post-card,.contact-card{border:1px solid #dbe3ef;border-radius:8px;padding:26px;background:#fff;box-shadow:0 8px 28px rgba(23,32,51,.06);text-decoration:none}.post-card h3 a{text-decoration:none}.page-header{padding:76px 0 38px}.two-column{display:grid;grid-template-columns:1.1fr .9fr;gap:48px}.callout{border-left:4px solid #1769d2;padding-left:24px}.article-shell{width:min(790px,calc(100% - 40px));margin:auto;padding:60px 0 86px}.site-footer{display:flex;justify-content:space-between;gap:28px;border-top:1px solid #dbe3ef;padding:34px 0 42px;color:#5c667a}@media(max-width:800px){.site-header{align-items:flex-start;flex-direction:column;padding:18px 0}.post-grid,.two-column,.contact-grid{grid-template-columns:1fr}.site-footer{flex-direction:column}.hero{width:100%;margin-top:0}.hero img{border-left:0;border-right:0}}
          """
          (dist / 'assets' / 'site.css').write_text(css)

          nav = "<header class='site-header'><a class='brand' href='/'><span class='brand-mark'>MB</span><span>MBA Blog</span></a><nav><a href='/'>Home</a><a href='/blog/'>Blog</a><a href='/about.html'>About</a><a href='/contact.html'>Contact</a></nav></header>"
          foot = "<footer class='site-footer'><div><strong>MBA Blog</strong><p>Healthcare systems. Smarter workflows. Better outcomes.</p></div><p>&copy; 2026 MBA Blog.</p></footer>"
          posts = [
            ('Building a Clearer Operating Rhythm','building-a-clearer-operating-rhythm','A practical framework for turning scattered priorities into a reliable weekly leadership cadence.','Strong teams do not need more meetings. They need a better rhythm for deciding what matters, seeing what changed, and making tradeoffs in time to matter.'),
            ('What Good Strategy Feels Like','what-good-strategy-feels-like','Good strategy changes how teams choose, sequence, and say no.','Good strategy reduces the number of open questions and makes certain tradeoffs obvious.'),
            ('Designing Better Business Writing','designing-better-business-writing','How to make business writing clearer and easier to act on.','The best business writing respects the reader attention. Clear writing is generous.'),
          ]
          def page(title, desc, body):
            return f"<!doctype html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>{html.escape(title)} | MBA Blog</title><meta name='description' content='{html.escape(desc)}'><link rel='stylesheet' href='/assets/site.css'></head><body>{nav}<main>{body}</main>{foot}</body></html>"
          def card(p):
            title, slug, desc, _ = p
            return f"<article class='post-card'><h3><a href='/blog/{slug}.html'>{html.escape(title)}</a></h3><p>{html.escape(desc)}</p><a class='button' href='/blog/{slug}.html'>Read article</a></article>"

          cards = ''.join(card(p) for p in posts)
          home = "<section class='hero'><img src='/assets/hero-healthcare.jpg' alt='Healthcare systems, smarter workflows, better outcomes'></section><section class='section section-muted'><h2>Latest writing</h2><div class='post-grid'>" + cards + "</div></section>"
          (dist / 'index.html').write_text(page('MBA Blog','Healthcare workflow and informatics insights.',home))

          blog = "<section class='page-header'><p class='eyebrow'>The archive</p><h1>Ideas for clearer healthcare and business decisions.</h1><p>Short, practical essays for people who want their work to be sharper, calmer, and easier to act on.</p></section><section class='section'><div class='post-grid'>" + cards + "</div></section>"
          (dist / 'blog' / 'index.html').write_text(page('Blog','Read essays from MBA Blog.',blog))

          about = "<section class='page-header'><p class='eyebrow'>About the brand</p><h1>Professional thinking with a human pulse.</h1><p>MBA Blog publishes practical essays for leaders, operators, builders, and students of business who want sharper judgment without the jargon fog.</p></section><section class='content-band two-column'><div><h2>What this site is for</h2><p>This is a place for clear frameworks and field-tested notes on how systems make decisions, communicate priorities, and build momentum.</p></div><div class='callout'><h2>Core themes</h2><ul><li>Healthcare workflow</li><li>Clinical systems</li><li>Operations and technology</li><li>AI-assisted efficiency</li></ul></div></section>"
          (dist / 'about.html').write_text(page('About','Learn about MBA Blog.',about))

          contact = "<section class='page-header'><p class='eyebrow'>Contact</p><h1>Let’s start the right conversation.</h1><p>For collaborations, consulting inquiries, interviews, or thoughtful notes, use the links below.</p></section><section class='content-band contact-grid'><a class='contact-card' href='mailto:hello@example.com'><span>Email</span><strong>hello@example.com</strong></a><a class='contact-card' href='https://www.linkedin.com/'><span>LinkedIn</span><strong>Connect professionally</strong></a><a class='contact-card' href='/blog/'><span>Writing</span><strong>Browse the latest essays</strong></a></section>"
          (dist / 'contact.html').write_text(page('Contact','Contact MBA Blog.',contact))

          for title, slug, desc, text in posts:
            body = f"<article class='article-shell'><a href='/blog/'>Back to blog</a><h1>{html.escape(title)}</h1><p>{html.escape(desc)}</p><div><p>{html.escape(text)}</p></div></article>"
            (dist / 'blog' / f'{slug}.html').write_text(page(title, desc, body))
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
