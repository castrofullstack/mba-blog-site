name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare repository
        run: |
          rm -rf assets images files admin
          rm -rf src/components/src src/content/blog/src src/content/blog/blog src/content/content src/src
          rm -f src/content/blog/.keep src/content/blog/config.ts src/content/designing-better-business-writing.md
          rm -f contact.html index.html favicon.ico headshot-on-white.jpg hero-healthcare.png

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: ASTRO_TELEMETRY_DISABLED=1 npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
