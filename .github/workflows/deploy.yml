name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          set -e
          BASE="/mba-blog-site"
          rm -rf dist
          mkdir -p dist/blog/building-a-clearer-operating-rhythm dist/blog/what-good-strategy-feels-like dist/blog/designing-better-business-writing dist/assets
          cp headshot-on-white.jpg dist/headshot-on-white.jpg
          cat > dist/assets/site.css <<'EOF'
          :root{--ink:#172033;--muted:#5c667a;--line:#dbe3ef;--paper:#fff;--soft:#f4f8fc;--blue:#1769d2;--blue-dark:#0b3b75;--teal:#0f8c8c;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-width:320px;color:var(--ink);line-height:1.6;background:var(--paper)}a{color:inherit}.site-header,.site-footer,.section,.page-header,.content-band,.article-shell{width:min(1120px,calc(100% - 40px));margin-inline:auto}.site-header{min-height:76px;display:flex;align-items:center;justify-content:space-between;gap:24px}.brand,.site-header nav,.hero-actions,.post-meta{display:flex;align-items:center}.brand{gap:10px;font-weight:800;text-decoration:none}.brand-mark{width:38px;height:38px;display:grid;place-items:center;border-radius:8px;color:#fff;background:var(--blue-dark);font-size:.82rem}.site-header nav{gap:6px;flex-wrap:wrap;justify-content:flex-end}.site-header nav a{border-radius:8px;padding:8px 12px;color:var(--muted);font-weight:650;text-decoration:none}.site-header nav a:hover{color:var(--blue-dark);background:var(--soft)}.hero{position:relative;min-height:clamp(560px,78vh,740px);display:grid;align-items:end;overflow:hidden;isolation:isolate}.hero img{position:absolute;inset:0;z-index:-2;width:100%;height:100%;object-fit:cover}.hero:after{position:absolute;inset:0;z-index:-1;content:"";background:linear-gradient(90deg,rgba(255,255,255,.96),rgba(255,255,255,.82) 42%,rgba(255,255,255,.28) 78%),linear-gradient(0deg,rgba(11,59,117,.18),rgba(11,59,117,0))}.hero-overlay{width:min(1120px,calc(100% - 40px));margin:0 auto;padding:0 0 clamp(68px,10vh,120px)}.eyebrow{margin:0 0 12px;color:var(--teal);font-size:.78rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1,h2,h3,p{margin-top:0}h1{max-width:790px;margin-bottom:20px;font-size:clamp(2.55rem,7vw,5.9rem);line-height:.98}h2{margin-bottom:14px;font-size:clamp(2rem,4vw,3.4rem);line-height:1.04}h3{margin-bottom:12px;font-size:1.35rem;line-height:1.18}.hero-copy,.page-header p,.article-header p{max-width:690px;color:var(--muted);font-size:clamp(1.05rem,2vw,1.28rem)}.hero-actions{gap:12px;flex-wrap:wrap;margin-top:28px}.button,.text-link{font-weight:800;text-decoration:none}.button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;border:1px solid var(--blue);border-radius:8px;padding:10px 18px;color:#fff;background:var(--blue)}.button:hover{background:var(--blue-dark);border-color:var(--blue-dark)}.button-secondary{color:var(--blue-dark);background:rgba(255,255,255,.72)}.section,.content-band{padding-block:78px}.section-muted{width:100%;max-width:none;margin-top:10px;padding-inline:max(20px,calc((100% - 1120px)/2));background:var(--soft)}.section-heading{margin-bottom:26px}.post-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}.post-card{height:100%;border:1px solid var(--line);border-radius:8px;padding:26px;background:#fff;box-shadow:0 8px 28px rgba(23,32,51,.06)}.post-card h3 a{text-decoration:none}.post-card p,.content-band p,.content-band li,.prose p,.prose li{color:var(--muted)}.post-meta{gap:8px;flex-wrap:wrap;margin-bottom:14px;color:var(--muted);font-size:.86rem;font-weight:700}.post-meta span{border-left:1px solid var(--line);padding-left:8px}.page-header{padding:76px 0 38px}.two-column{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:start}.callout{border-left:4px solid var(--blue);padding:4px 0 4px 24px}.contact-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.contact-card{border:1px solid var(--line);border-radius:8px;padding:24px;text-decoration:none;background:#fff}.contact-card span{display:block;color:var(--teal);font-size:.82rem;font-weight:800;text-transform:uppercase}.contact-card strong{display:block;margin-top:8px;font-size:1.1rem}.article-shell{max-width:790px;padding:60px 0 86px}.back-link{display:inline-block;margin-bottom:32px;color:var(--muted);font-weight:800;text-decoration:none}.article-header{margin-bottom:42px}.prose{font-size:1.1rem}.site-footer{display:flex;justify-content:space-between;gap:28px;border-top:1px solid var(--line);padding:34px 0 42px;color:var(--muted)}.site-footer p{margin-bottom:0}.site-footer strong{color:var(--ink)}@media(max-width:800px){.site-header{align-items:flex-start;flex-direction:column;padding:18px 0}.post-grid,.two-column,.contact-grid{grid-template-columns:1fr}.section,.content-band{padding-block:54px}.site-footer{flex-direction:column}}@media(max-width:520px){.site-header,.site-footer,.section,.page-header,.content-band,.article-shell,.hero-overlay{width:min(100% - 28px,1120px)}.hero-actions{align-items:stretch;flex-direction:column}.button{width:100%}.post-card,.contact-card{padding:22px}}
          EOF
          write_head(){ cat <<EOF
          <!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>$1 | MBA Blog</title><meta name="description" content="$2"><link rel="stylesheet" href="$BASE/assets/site.css"></head><body><header class="site-header"><a class="brand" href="$BASE/"><span class="brand-mark">MB</span><span>MBA Blog</span></a><nav><a href="$BASE/">Home</a><a href="$BASE/blog/">Blog</a><a href="$BASE/about/">About</a><a href="$BASE/contact/">Contact</a></nav></header><main>
          EOF
          }
          write_foot(){ cat <<EOF
          </main><footer class="site-footer"><div><strong>MBA Blog</strong><p>Sharp thinking for strategy, leadership, and better business decisions.</p></div><p>&copy; 2026 MBA Blog. All rights reserved.</p></footer></body></html>
          EOF
          }
          card(){ cat <<EOF
          <article class="post-card"><div class="post-meta"><time>$3</time><span>$4</span></div><h3><a href="$BASE/blog/$2/">$1</a></h3><p>$5</p><a class="text-link" href="$BASE/blog/$2/">Read article</a></article>
          EOF
          }
          { write_head "MBA Blog" "A modern professional blog for strategy, leadership, operations, and clearer business thinking."; cat <<EOF
          <section class="hero"><img src="$BASE/headshot-on-white.jpg" alt="Christopher Castro headshot on a clean white background"><div class="hero-overlay"><p class="eyebrow">Strategy, leadership, and practical clarity</p><h1>Better thinking for the work that shapes a business.</h1><p class="hero-copy">MBA Blog is a home for concise essays on decision making, operating rhythm, communication, and the craft of building durable companies.</p><div class="hero-actions"><a class="button" href="$BASE/blog/">Read the blog</a><a class="button button-secondary" href="$BASE/about/">About the brand</a></div></div></section><section class="section"><div class="section-heading"><p class="eyebrow">Featured essay</p><h2>Start with the useful conversation.</h2></div>
          EOF
          card "Building a Clearer Operating Rhythm" "building-a-clearer-operating-rhythm" "May 17, 2026" "Leadership" "A practical framework for turning scattered priorities into a reliable weekly leadership cadence."; cat <<EOF
          </section><section class="section section-muted"><div class="section-heading"><p class="eyebrow">Latest writing</p><h2>Recent notes and essays</h2></div><div class="post-grid">
          EOF
          card "What Good Strategy Feels Like" "what-good-strategy-feels-like" "May 10, 2026" "Strategy" "Good strategy is not just a document. It changes how teams choose, sequence, and say no."; card "Designing Better Business Writing" "designing-better-business-writing" "April 28, 2026" "Writing" "How to make business writing clearer, more useful, and easier for busy readers to act on."; echo '</div></section>'; write_foot; } > dist/index.html
          { write_head "Blog" "Read essays from MBA Blog on strategy, leadership, operations, and communication."; echo '<section class="page-header"><p class="eyebrow">The archive</p><h1>Ideas for clearer business decisions.</h1><p>Short, practical essays for people who want their work to be sharper, calmer, and easier to act on.</p></section><section class="section"><div class="post-grid">'; card "Building a Clearer Operating Rhythm" "building-a-clearer-operating-rhythm" "May 17, 2026" "Leadership" "A practical framework for turning scattered priorities into a reliable weekly leadership cadence."; card "What Good Strategy Feels Like" "what-good-strategy-feels-like" "May 10, 2026" "Strategy" "Good strategy is not just a document. It changes how teams choose, sequence, and say no."; card "Designing Better Business Writing" "designing-better-business-writing" "April 28, 2026" "Writing" "How to make business writing clearer, more useful, and easier for busy readers to act on."; echo '</div></section>'; write_foot; } > dist/blog/index.html
          { write_head "About" "Learn about MBA Blog."; echo '<section class="page-header"><p class="eyebrow">About the brand</p><h1>Professional thinking with a human pulse.</h1><p>MBA Blog publishes practical essays for leaders, operators, builders, and students of business who want sharper judgment without the jargon fog.</p></section><section class="content-band two-column"><div><h2>What this site is for</h2><p>This is a place for clear frameworks, thoughtful analysis, and field-tested notes on how businesses make decisions, communicate priorities, and build momentum.</p><p>The tone is professional but approachable: useful enough for a Monday morning meeting, readable enough for a quiet Sunday reset.</p></div><div class="callout"><h2>Core themes</h2><ul><li>Strategy that changes decisions</li><li>Leadership routines that reduce ambiguity</li><li>Business writing that respects attention</li><li>Operations that make good work repeatable</li></ul></div></section>'; write_foot; } > dist/about.html
          { write_head "Contact" "Contact MBA Blog."; echo '<section class="page-header"><p class="eyebrow">Contact</p><h1>Let’s start the right conversation.</h1><p>For collaborations, consulting inquiries, interviews, or thoughtful notes, use the links below.</p></section><section class="content-band contact-grid"><a class="contact-card" href="mailto:hello@example.com"><span>Email</span><strong>hello@example.com</strong></a><a class="contact-card" href="https://www.linkedin.com/"><span>LinkedIn</span><strong>Connect professionally</strong></a><a class="contact-card" href="/mba-blog-site/blog/"><span>Writing</span><strong>Browse the latest essays</strong></a></section>'; write_foot; } > dist/contact.html
          article(){ mkdir -p "dist/blog/$2"; { write_head "$1" "$5"; cat <<EOF
          <article class="article-shell"><a class="back-link" href="$BASE/blog/">Back to blog</a><header class="article-header"><div class="post-meta"><time>$3</time><span>$4</span></div><h1>$1</h1><p>$5</p></header><div class="prose">$6</div></article>
          EOF
          write_foot; } > "dist/blog/$2/index.html"; }
          article "Building a Clearer Operating Rhythm" "building-a-clearer-operating-rhythm" "May 17, 2026" "Leadership" "A practical framework for turning scattered priorities into a reliable weekly leadership cadence." "<p>Strong teams do not need more meetings. They need a better rhythm for deciding what matters, seeing what changed, and making tradeoffs in time to matter.</p><p>Start by separating direction, progress, and decisions. The goal is not perfect alignment. The goal is less ambiguity, earlier.</p>"
          article "What Good Strategy Feels Like" "what-good-strategy-feels-like" "May 10, 2026" "Strategy" "Good strategy is not just a document. It changes how teams choose, sequence, and say no." "<p>Good strategy usually feels quieter than people expect. It reduces the number of open questions. It makes certain tradeoffs obvious.</p><p>If a strategy cannot help a team decide what to do on a Tuesday afternoon, it is not yet useful as strategy.</p>"
          article "Designing Better Business Writing" "designing-better-business-writing" "April 28, 2026" "Writing" "How to make business writing clearer, more useful, and easier for busy readers to act on." "<p>The best business writing respects the reader's attention. It starts with the point, explains the stakes, and makes the next action easy to find.</p><p>Clear writing is generous. It lowers the cost of thinking for everyone who has to use it.</p>"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
